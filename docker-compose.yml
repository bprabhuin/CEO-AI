version: '3.9'

# ─────────────────────────────────────────────────────────────
# AetherOS — Docker Compose (Development)
# Usage: docker-compose up --build
# ─────────────────────────────────────────────────────────────

services:
  aetheros:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder        # Stop at build stage, use CRA dev server
    image: aetheros-dev
    container_name: aetheros-dev
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_ANTHROPIC_API_KEY=${REACT_APP_ANTHROPIC_API_KEY}
      - REACT_APP_VERSION=${REACT_APP_VERSION:-4.0.0-dev}
      - CHOKIDAR_USEPOLLING=true   # File watching inside Docker
    volumes:
      - ./src:/app/src              # Hot reload — mount source
      - ./public:/app/public
      - /app/node_modules           # Don't mount host node_modules
    command: npm start
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  default:
    name: aetheros-network
